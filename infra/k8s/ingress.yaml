apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: battery-poc-ingress
  namespace: battery-poc
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/backend-protocol: "http"
spec:
  rules:
    - http:
        paths:
          - path: /v1/telemetry
            pathType: Prefix
            backend:
              service:
                name: telemetry-service
                port:
                  number: 8080
          - path: /v1/alerts
            pathType: Prefix
            backend:
              service:
                name: alert-service
                port:
                  number: 8081
          - path: /v1/legacy
            pathType: Prefix
            backend:
              service:
                name: legacy-sync-service
                port:
                  number: 8082
