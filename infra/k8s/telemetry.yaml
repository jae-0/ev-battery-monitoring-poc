apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-service
  namespace: battery-poc
  labels:
    app: telemetry-service
spec:
  replicas: 2                       # RELIABILITY.md: Multi-AZ 최소 2개
  selector:
    matchLabels:
      app: telemetry-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0             # 무중단 배포 (deploy.yml 요구사항)
      maxSurge: 1
  template:
    metadata:
      labels:
        app: telemetry-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: telemetry
          image: glovispocacr.azurecr.io/telemetry-service:latest  # deploy.yml의 kubectl set image로 교체됨
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: battery-poc-config
          env:
            - name: COSMOS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: battery-poc-secrets
                  key: cosmos-endpoint
            - name: COSMOS_KEY
              valueFrom:
                secretKeyRef:
                  name: battery-poc-secrets
                  key: cosmos-key
            - name: IOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: battery-poc-secrets
                  key: iot-api-key
            - name: KEY_VAULT_URI
              valueFrom:
                secretKeyRef:
                  name: battery-poc-secrets
                  key: key-vault-uri
            - name: KAFKA_SASL_JAAS_CONFIG
              valueFrom:
                secretKeyRef:
                  name: battery-poc-secrets
                  key: kafka-sasl-jaas-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
      topologySpreadConstraints:    # RELIABILITY.md: Multi-AZ 분산 배치
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: telemetry-service
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-service
  namespace: battery-poc
spec:
  selector:
    app: telemetry-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP                   # 외부 노출 없음 — API Gateway가 앞단 처리
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: telemetry-service-hpa
  namespace: battery-poc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: telemetry-service
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70    # RELIABILITY.md: CPU 70% 초과 시 Scale-out
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60  # RELIABILITY.md: 1분 이내 Scale-out
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
