apiVersion: apps/v1
kind: Deployment
metadata:
  name: legacy-sync-service
  namespace: battery-poc
  labels:
    app: legacy-sync-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: legacy-sync-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: legacy-sync-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8082"
    spec:
      containers:
        - name: legacy-sync
          image: legacy-sync-service:latest
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: battery-poc-config
          env:
            - name: RDS_SECRET_ARN
              valueFrom:
                secretKeyRef:
                  name: battery-poc-secrets
                  key: rds-secret-arn
            - name: RDS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: battery-poc-secrets
                  key: rds-username
            - name: RDS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: battery-poc-secrets
                  key: rds-password
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 5
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: legacy-sync-service
---
apiVersion: v1
kind: Service
metadata:
  name: legacy-sync-service
  namespace: battery-poc
spec:
  selector:
    app: legacy-sync-service
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: legacy-sync-service-hpa
  namespace: battery-poc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: legacy-sync-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
