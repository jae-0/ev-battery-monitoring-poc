# terraform output 후 infra-outputs.yaml 참조하여 값 기입
apiVersion: v1
kind: ConfigMap
metadata:
  name: battery-poc-config
  namespace: battery-poc
data:
  AZURE_LOCATION: "koreacentral"
  # ── Kafka (Azure Event Hubs) ──────────────────────────────────────
  KAFKA_BOOTSTRAP_SERVERS: ""           # eventhub.bootstrap_servers
  KAFKA_SECURITY_PROTOCOL: "SASL_SSL"
  KAFKA_SASL_MECHANISM: "PLAIN"
  KAFKA_TOPIC_TELEMETRY_RAW: ""         # eventhub.topics.telemetry_raw
  KAFKA_TOPIC_TELEMETRY_PROCESSED: ""   # eventhub.topics.telemetry_processed
  KAFKA_TOPIC_ALERT_EVENTS: ""          # eventhub.topics.alert_events
  KAFKA_TOPIC_LEGACY_SYNC_QUEUE: ""     # eventhub.topics.legacy_sync_queue
  KAFKA_TOPIC_DEAD_LETTER: ""           # eventhub.topics.dead_letter
  # ── Cosmos DB ─────────────────────────────────────────────────────
  COSMOS_DATABASE: "battery-poc"
  COSMOS_CONTAINER: "battery-telemetry"
  # ── PostgreSQL ────────────────────────────────────────────────────
  RDS_ENDPOINT: ""                      # postgres.fqdn
  RDS_DB_NAME: "glovis_poc"
  # ── Misc ──────────────────────────────────────────────────────────
  LEGACY_API_BASE_URL: "http://mock-legacy-api"
