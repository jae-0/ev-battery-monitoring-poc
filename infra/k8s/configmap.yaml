# terraform output 후 infra-outputs.yaml 참조하여 값 기입
apiVersion: v1
kind: ConfigMap
metadata:
  name: battery-poc-config
  namespace: battery-poc
data:
  AZURE_LOCATION: "koreacentral"
  # ── Kafka (Azure Event Hubs) ──────────────────────────────────────
  KAFKA_BOOTSTRAP_SERVERS: "glovis-poc-eventhub.servicebus.windows.net:9093"
  KAFKA_SECURITY_PROTOCOL: "SASL_SSL"
  KAFKA_SASL_MECHANISM: "PLAIN"
  KAFKA_TOPIC_TELEMETRY_RAW: "telemetry-raw"
  KAFKA_TOPIC_TELEMETRY_PROCESSED: "telemetry-processed"
  KAFKA_TOPIC_ALERT_EVENTS: "alert-events"
  KAFKA_TOPIC_LEGACY_SYNC_QUEUE: "legacy-sync-queue"
  KAFKA_TOPIC_DEAD_LETTER: "dead-letter-topic"
  # ── Cosmos DB ─────────────────────────────────────────────────────
  COSMOS_DATABASE: "battery-poc"
  COSMOS_CONTAINER: "battery-telemetry"
  # ── PostgreSQL ────────────────────────────────────────────────────
  RDS_ENDPOINT: "glovis-poc-postgres.postgres.database.azure.com"
  RDS_DB_NAME: "glovis_poc"
  # ── Misc ──────────────────────────────────────────────────────────
  LEGACY_API_BASE_URL: "http://mock-legacy-api"
