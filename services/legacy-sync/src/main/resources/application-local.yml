# local 프로필
spring:
  jpa:
    hibernate:
      ddl-auto: none   # infra/local/init.sql이 스키마 관리

spring:
  kafka:
    properties:
      security.protocol: PLAINTEXT  # 로컬 Kafka는 인증 없음

legacy:
  api:
    base-url: ${LEGACY_API_BASE_URL:http://localhost:8090}

logging:
  level:
    com.battery.poc: DEBUG
    org.hibernate.SQL: DEBUG
