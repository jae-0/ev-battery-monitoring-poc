server:
  port: 8080

spring:
  application:
    name: telemetry-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}   # contracts/infra-outputs.yaml: eventhub.bootstrap_servers
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all          # DESIGN.md: Idempotency - 데이터 무결성 보장
      retries: 3
      properties:
        enable.idempotence: true
        # Azure Event Hubs Kafka 연동 (SASL/SSL 인증)
        security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
        sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
        sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}

kafka:
  topics:
    telemetry-raw: ${KAFKA_TOPIC_TELEMETRY_RAW}     # contracts/infra-outputs.yaml: eventhub.topics.telemetry_raw

# Azure Cosmos DB (AWS DynamoDB 대응)
azure:
  cosmos:
    uri: ${COSMOS_ENDPOINT}                         # contracts/infra-outputs.yaml: cosmosdb.endpoint
    key: ${COSMOS_KEY}                              # contracts/infra-outputs.yaml: cosmosdb.primary_key
    database: ${COSMOS_DATABASE:battery-poc}
    container: ${COSMOS_CONTAINER:battery-telemetry}
  keyvault:
    uri: ${KEY_VAULT_URI:}                          # contracts/infra-outputs.yaml: key_vault_uri

iot:
  api-key: ${IOT_API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.battery.poc: INFO
    org.springframework.kafka: WARN
