name: Build & Test

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  # ──────────────────────────────────────────
  # Telemetry Service
  # ──────────────────────────────────────────
  build-telemetry:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/telemetry
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test (커버리지 80% 미만 시 실패)
        run: mvn verify

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=battery-poc-telemetry \
            -Dsonar.qualitygate.wait=true

      - name: Docker Build
        run: docker build -t telemetry-service:${{ github.sha }} .

  # ──────────────────────────────────────────
  # Alert Service
  # ──────────────────────────────────────────
  build-alert:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/alert
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        run: mvn verify

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=battery-poc-alert \
            -Dsonar.qualitygate.wait=true

      - name: Docker Build
        run: docker build -t alert-service:${{ github.sha }} .

  # ──────────────────────────────────────────
  # Legacy Sync Service
  # ──────────────────────────────────────────
  build-legacy-sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/legacy-sync
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        run: mvn verify

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=battery-poc-legacy-sync \
            -Dsonar.qualitygate.wait=true

      - name: Docker Build
        run: docker build -t legacy-sync-service:${{ github.sha }} .

  # ──────────────────────────────────────────
  # Terraform Security Scan (infra/ 변경 시만)
  # ──────────────────────────────────────────
  tfsec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check infra/ changed
        id: infra-changed
        uses: tj-actions/changed-files@v44
        with:
          files: infra/**

      - name: tfsec Scan (High 취약점 존재 시 실패)
        if: steps.infra-changed.outputs.any_changed == 'true'
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra/terraform
          minimum_severity: HIGH
