name: Deploy to AKS

on:
  workflow_run:
    workflows: ["Build & Test"]
    branches: [main]
    types: [completed]

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}        # e.g. glovispocacr.azurecr.io
  AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
  AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      # Azure 로그인 (AWS configure-aws-credentials 대응)
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ACR 로그인 (AWS ECR login 대응)
      - name: Login to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      # ── Telemetry Service ──
      - name: Build & Push telemetry image
        working-directory: services/telemetry
        run: |
          docker build -t $ACR_REGISTRY/telemetry-service:${{ github.sha }} -t $ACR_REGISTRY/telemetry-service:latest .
          docker push $ACR_REGISTRY/telemetry-service:${{ github.sha }}
          docker push $ACR_REGISTRY/telemetry-service:latest

      # ── Alert Service ──
      - name: Build & Push alert image
        working-directory: services/alert
        run: |
          docker build -t $ACR_REGISTRY/alert-service:${{ github.sha }} -t $ACR_REGISTRY/alert-service:latest .
          docker push $ACR_REGISTRY/alert-service:${{ github.sha }}
          docker push $ACR_REGISTRY/alert-service:latest

      # ── Legacy Sync Service ──
      - name: Build & Push legacy-sync image
        working-directory: services/legacy-sync
        run: |
          docker build -t $ACR_REGISTRY/legacy-sync-service:${{ github.sha }} -t $ACR_REGISTRY/legacy-sync-service:latest .
          docker push $ACR_REGISTRY/legacy-sync-service:${{ github.sha }}
          docker push $ACR_REGISTRY/legacy-sync-service:latest

      # AKS kubeconfig 설정 (AWS eks update-kubeconfig 대응)
      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      # ── K8s Manifest 적용 (최초 배포 시 Deployment 생성) ──
      - name: Apply K8s manifests
        run: |
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/configmap.yaml
          kubectl apply -f infra/k8s/telemetry.yaml
          kubectl apply -f infra/k8s/alert.yaml
          kubectl apply -f infra/k8s/legacy-sync.yaml

      # ── AKS 배포 (Rolling Update — 무중단) ──
      - name: Deploy to AKS (Rolling Update)
        run: |
          kubectl set image deployment/telemetry-service \
            telemetry=$ACR_REGISTRY/telemetry-service:${{ github.sha }} \
            --namespace battery-poc

          kubectl set image deployment/alert-service \
            alert=$ACR_REGISTRY/alert-service:${{ github.sha }} \
            --namespace battery-poc

          kubectl set image deployment/legacy-sync-service \
            legacy-sync=$ACR_REGISTRY/legacy-sync-service:${{ github.sha }} \
            --namespace battery-poc

      # ── 배포 상태 확인 (60초 내 미완료 시 자동 롤백) ──
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/telemetry-service -n battery-poc --timeout=180s || \
            (kubectl rollout undo deployment/telemetry-service -n battery-poc && exit 1)

          kubectl rollout status deployment/alert-service -n battery-poc --timeout=180s || \
            (kubectl rollout undo deployment/alert-service -n battery-poc && exit 1)

          kubectl rollout status deployment/legacy-sync-service -n battery-poc --timeout=180s || \
            (kubectl rollout undo deployment/legacy-sync-service -n battery-poc && exit 1)
