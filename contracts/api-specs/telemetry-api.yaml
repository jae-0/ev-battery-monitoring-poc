meta:
  status: "completed"
  generated_at: "2026-04-14T00:00:00Z"

spec:
  openapi: "3.0.0"
  info:
    title: "Telemetry Service API"
    version: "1.0.0"
    description: "IoT 배터리 센서 데이터 수신 및 조회 API"
  servers:
    - url: "http://localhost:8080"
  paths:
    /v1/telemetry:
      post:
        summary: "배터리 센서 데이터 수신"
        parameters:
          - in: header
            name: X-API-Key
            required: true
            schema: { type: string }
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelemetryRequest"
        responses:
          "202": { description: "Accepted" }
          "401": { description: "Invalid API Key" }
          "400": { description: "Validation Error" }
    /v1/telemetry/{batteryId}/latest:
      get:
        summary: "배터리 최신 상태 조회"
        parameters:
          - in: path
            name: batteryId
            required: true
            schema: { type: string }
        responses:
          "200":
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/TelemetryResponse"
          "404": { description: "Not Found" }
  components:
    schemas:
      TelemetryRequest:
        type: object
        required: [batteryId, vehicleId, temperature, voltage, gpsLat, gpsLng]
        properties:
          batteryId:   { type: string }
          vehicleId:   { type: string }
          timestamp:   { type: integer, format: int64 }
          temperature: { type: number }
          voltage:     { type: number }
          gpsLat:      { type: number }
          gpsLng:      { type: number }
      TelemetryResponse:
        type: object
        properties:
          batteryId:   { type: string }
          vehicleId:   { type: string }
          timestamp:   { type: integer, format: int64 }
          temperature: { type: number }
          voltage:     { type: number }
          gpsLat:      { type: number }
          gpsLng:      { type: number }
