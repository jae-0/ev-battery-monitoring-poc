version: "1.0"
generated_at: "2026-04-14T00:00:00Z"
phase: 1
status: "completed"
environment: "local"   # docker-compose 기반 로컬 환경 (AWS 전환 시 이 섹션 전체 교체)

eks:
  cluster_name: "local-docker-compose"
  region: "ap-northeast-2"
  namespace: "battery-poc"

msk:
  bootstrap_servers: "kafka:29092"   # docker-compose 서비스명
  topics:
    telemetry_raw: "telemetry-raw"
    telemetry_processed: "telemetry-processed"
    alert_events: "alert-events"
