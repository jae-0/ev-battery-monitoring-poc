    dead_letter: "dead-letter-topic"

rds:
  endpoint: "postgres"               # docker-compose 서비스명
  port: 5432
  database: "battery_poc"
  secret_arn: "local"                # 로컬: .env.local에서 직접 주입

dynamodb:
  table_name: "battery-telemetry"
  region: "ap-northeast-2"

s3:
  bucket_name: "local-skip"          # 로컬: S3/Athena 미사용
  region: "ap-northeast-2"

api_gateway:
  endpoint: "http://localhost:8080"
  stage: "local"
