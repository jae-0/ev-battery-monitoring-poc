networks:
  battery-poc:
    driver: bridge

volumes:
  postgres-data:
  grafana-data:
  cosmos-data:

services:

  # ── 인프라 ────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    networks: [battery-poc]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 10 2>/dev/null"]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    networks: [battery-poc]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://host.docker.internal:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  # Kafka 토픽 자동 생성 (contracts/kafka-schemas/ 기준)
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    networks: [battery-poc]
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic telemetry-raw --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic telemetry-processed --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic alert-events --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic legacy-sync-queue --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dead-letter-topic --partitions 1 --replication-factor 1
        echo "Kafka topics created"

  # Azure Cosmos DB Emulator (DynamoDB Local 대응)
  # 로컬 개발용 — 프로덕션은 Azure Cosmos DB 사용
  cosmosdb-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    networks: [battery-poc]
    ports:
      - "8091:8081"
      - "10251:10251"
      - "10252:10252"
      - "10253:10253"
      - "10254:10254"
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: 10
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "false"
    volumes:
      - cosmos-data:/tmp/cosmos
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:8081/_explorer/emulator.pem > /dev/null 2>&1 && echo OK || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  postgres:
    image: postgres:15-alpine
    networks: [battery-poc]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: glovis_poc
      POSTGRES_USER: glovis_admin
      POSTGRES_PASSWORD: local_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/local/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glovis_admin -d glovis_poc"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── 모니터링 ─────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    networks: [battery-poc]
    ports:
      - "9090:9090"
    volumes:
      - ./infra/local/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'

  grafana:
    image: grafana/grafana:10.4.0
    networks: [battery-poc]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/local/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/local/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  dashboard:
    image: nginx:alpine
    networks: [battery-poc]
    ports:
      - "3001:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro

  # ── 애플리케이션 ──────────────────────────────────

  telemetry-service:
    build:
      context: ./services/telemetry
    networks: [battery-poc]
    ports:
      - "8080:8080"
    env_file: .env.local
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      kafka:
        condition: service_healthy
      cosmosdb-emulator:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  alert-service:
    build:
      context: ./services/alert
    networks: [battery-poc]
    ports:
      - "8081:8081"
    env_file: .env.local
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  legacy-sync-service:
    build:
      context: ./services/legacy-sync
    networks: [battery-poc]
    ports:
      - "8082:8082"
    env_file: .env.local
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
