networks:
  battery-poc:
    driver: bridge

volumes:
  postgres-data:

services:

  # ── 인프라 ────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    networks: [battery-poc]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 10 2>/dev/null"]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    networks: [battery-poc]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://host.docker.internal:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  # Kafka 토픽 자동 생성 (contracts/kafka-schemas/ 기준)
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    networks: [battery-poc]
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic telemetry-raw --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic telemetry-processed --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic alert-events --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic legacy-sync-queue --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dead-letter-topic --partitions 1 --replication-factor 1
        echo "Kafka topics created"

  dynamodb-local:
    image: amazon/dynamodb-local:2.0.0
    networks: [battery-poc]
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    healthcheck:
      # DynamoDB Local은 400을 반환하면 정상 (서비스가 떠 있다는 의미)
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8000 | grep -qE '(200|400|405)'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  postgres:
    image: postgres:15-alpine
    networks: [battery-poc]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: battery_poc
      POSTGRES_USER: battery_admin
      POSTGRES_PASSWORD: local_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/local/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U battery_admin -d battery_poc"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── 애플리케이션 ──────────────────────────────────

  telemetry-service:
    build:
      context: ./services/telemetry
    networks: [battery-poc]
    ports:
      - "8080:8080"
    env_file: .env.local
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      kafka:
        condition: service_healthy
      dynamodb-local:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  alert-service:
    build:
      context: ./services/alert
    networks: [battery-poc]
    ports:
      - "8081:8081"
    env_file: .env.local
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  legacy-sync-service:
    build:
      context: ./services/legacy-sync
    networks: [battery-poc]
    ports:
      - "8082:8082"
    env_file: .env.local
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
